version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpass}
      POSTGRES_DB: ${POSTGRES_DB:-stocksentiment}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockuser} -d ${POSTGRES_DB:-stocksentiment}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for Ollama...';
        until curl -sf http://ollama:11434/api/tags > /dev/null; do
          echo 'Not ready yet, retrying in 3s...';
          sleep 3;
        done;
        echo 'Ollama ready. Pulling model via API...';
        curl -sf -X POST http://ollama:11434/api/pull -d '{\"name\":\"llama3.2:3b\"}' --max-time 600;
        echo 'Done!';
      "
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: on-failure:3
    ports:
      - "8000:8000"
    environment:
      NEWSAPI_KEY: ${NEWSAPI_KEY}
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY:-your_alpha_vantage_key_here}
      POSTGRES_USER: ${POSTGRES_USER:-stockuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpass}
      POSTGRES_DB: ${POSTGRES_DB:-stocksentiment}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ENVIRONMENT: ${ENVIRONMENT:-production}
      REFRESH_INTERVAL_MINUTES: ${REFRESH_INTERVAL_MINUTES:-15}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s   # Give 5 full minutes before first health check

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend   # Don't wait for healthy — just start after backend container exists

volumes:
  postgres_data:
  huggingface_cache:
  ollama_data:
